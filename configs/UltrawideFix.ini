; Ultrawide Fix Configuration for Resident Evil Requiem
; Copy this file to game folder, script will auto-load

[Display]
; Enable ultrawide fix (true/false)
Enabled = true

; Aspect ratio preset (auto, 21by9, 32by9, custom)
; auto = detect from desktop resolution
; 21by9 = 2.37
; 32by9 = 3.556
; custom = use CustomAspectRatio value
AspectPreset = auto

; Custom aspect ratio (only used if AspectPreset = custom)
CustomAspectRatio = 2.37

; Compensate FOV for ultrawide (true/false)
; Makes view less zoomed-in on wide screens
AdjustFOV = true

; Remove black bars in cutscenes (true/false)
FixCutscenes = true

; HUD positioning (center, stretch, keep)
; center = keep HUD in center (recommended)
; stretch = stretch HUD to edges (may look weird)
; keep = keep original position (may be off-screen)
HUDPosition = center

[Hotkeys]
; Toggle ultrawide fix on/off
ToggleKey = F10

; Cycle aspect ratio presets
CycleAspectKey = Ctrl+F10